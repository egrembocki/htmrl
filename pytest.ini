# pytest.ini
[pytest]
addopts = -ra
pythonpath = src
testpaths = tests
python_files = test_*.py
markers =
    unit: fast isolated tests for a single function/class/module
    integration: tests verifying collaboration between multiple components
    system: end-to-end behavior across major subsystems (agent/env/runtime)
    acceptance: user-facing acceptance criteria and scenario validation
    visual: marks tests that produce/validate SDR visualization output
